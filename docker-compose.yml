services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0

  web:
    profiles:
      - production
    build:
      context: .
      target: production
    ports:
      - "8080:80"

volumes:
  node_modules:
